<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>轻移 · 至手机端</title>
    <!-- 引入 Font Awesome 6 免费图标库 (纯视觉装饰) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 重置 & 基础氛围 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #eae5ff 0%, #d4d2f0 45%, #f0e7fa 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            color: #2a2745;
        }

        /* 优雅漂浮的背景圆 (增加层次感，无文字) */
        body::before {
            content: '';
            position: absolute;
            width: 40vmax;
            height: 40vmax;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 245, 240, 0.5), rgba(210, 190, 255, 0.3));
            top: -10vmax;
            left: -10vmax;
            z-index: 0;
            filter: blur(80px);
            animation: float-bg 18s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            width: 50vmin;
            height: 50vmin;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 190, 255, 0.3), rgba(240, 230, 255, 0.2));
            bottom: 0;
            right: 0;
            z-index: 0;
            filter: blur(70px);
            animation: float-bg 22s infinite alternate-reverse ease-in-out;
        }

        @keyframes float-bg {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(8%, 8%) scale(1.3); opacity: 0.9; }
        }

        /* 主卡片 —— 玻璃质感 + 精致圆润 */
        .glass-card {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 580px;
            background: rgba(255, 255, 255, 0.58);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 4rem 2rem 4rem 2rem;
            /* 不规则圆角增加柔美 */
            border-radius: 48px 24px 64px 24px;
            box-shadow: 0 30px 60px -20px rgba(60, 45, 120, 0.4),
                        0 10px 30px -10px rgba(0, 0, 0, 0.2),
                        inset 0 1px 2px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 3.2rem 2rem 3.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            animation: card-appear 0.8s cubic-bezier(0.15, 0.85, 0.35, 1.05) forwards;
            transform-origin: center;
        }

        @keyframes card-appear {
            0% { opacity: 0; transform: scale(0.92) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 图标容器 —— 用于承载波纹动画 */
        .icon-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.8rem;
            filter: drop-shadow(0 8px 18px rgba(130, 100, 200, 0.25));
        }

        /* 主手机图标 (灵动优雅) */
        .mobile-icon {
            font-size: 5.8rem;
            color: #4b3b7c;
            background: linear-gradient(145deg, #5f4b9c, #392f68);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(160, 140, 240, 0.6);
            position: relative;
            z-index: 10;
            animation: float-icon 3.5s infinite alternate ease-in-out;
            transform-origin: center;
            display: inline-block;
        }

        @keyframes float-icon {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-12px) scale(1.02); }
        }

        /* 三个扩散波纹 (无文字，纯装饰) */
        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(140, 120, 220, 0.35);
            box-shadow: 0 0 12px rgba(180, 150, 255, 0.4);
            pointer-events: none;
            z-index: 0;
            animation: ripple-wave 4s infinite ease-out;
        }

        .ripple:nth-child(2) {
            animation-delay: 1.2s;
            border-color: rgba(170, 140, 250, 0.3);
            box-shadow: 0 0 16px rgba(200, 160, 255, 0.5);
        }

        .ripple:nth-child(3) {
            animation-delay: 2.4s;
            border-color: rgba(200, 170, 255, 0.25);
            box-shadow: 0 0 20px rgba(220, 180, 255, 0.4);
            border-width: 1.8px;
        }

        @keyframes ripple-wave {
            0% {
                transform: translate(-50%, -50%) scale(0.2);
                opacity: 0.9;
                width: 40%;
                height: 40%;
            }
            60% {
                opacity: 0.3;
                width: 130%;
                height: 130%;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
                width: 180%;
                height: 180%;
            }
        }

        /* 核心信息 —— 唯一文字内容，极致考究 */
        .message {
            font-size: clamp(2.4rem, 8vw, 4rem);
            font-weight: 600;
            line-height: 1.2;
            text-align: center;
            letter-spacing: 0.02em;
            color: #2b234a;
            text-shadow: 0 4px 12px rgba(255, 255, 255, 0.6);
            background: linear-gradient(135deg, #2b1f44, #4a3a78);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0.5rem 0 0.2rem;
            padding: 0 0.5rem;
            white-space: balance;
        }

        /* 借助伪元素创造精致下划线 (无文字，只有线条) */
        .message::after {
            content: '';
            display: block;
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, #b7a6ff, #8875d4, #b7a6ff);
            border-radius: 4px;
            margin: 1.2rem auto 0;
            opacity: 0.7;
            box-shadow: 0 2px 6px rgba(160, 130, 240, 0.3);
        }

        /* 最下方的小小装饰 —— 纯粹视觉，不添加文字 */
        .corner-dots {
            position: absolute;
            bottom: 18px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 25;
            opacity: 0.5;
            pointer-events: none;
        }

        .corner-dots span {
            width: 8px;
            height: 8px;
            background-color: #7d6ba3;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #b6a2f0;
        }

        .corner-dots span:nth-child(2) {
            width: 12px;
            height: 12px;
            background-color: #a28fd6;
            opacity: 0.7;
        }

        /* 左边也有极简点线 */
        .line-ornament {
            position: absolute;
            top: 24px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-left: 2px solid rgba(255, 255, 255, 0.35);
            border-top: 2px solid rgba(255, 255, 255, 0.35);
            border-radius: 18px 0 0 0;
            z-index: 25;
            opacity: 0.5;
            pointer-events: none;
        }

        /* 让卡片在小屏幕也舒适 */
        @media (max-width: 480px) {
            .glass-card {
                padding: 2.5rem 1.2rem 2.8rem 1.2rem;
                border-radius: 36px 20px 48px 20px;
            }
            .icon-wrapper {
                width: 120px;
                height: 120px;
                margin-bottom: 1.2rem;
            }
            .mobile-icon {
                font-size: 5rem;
            }
            .message {
                font-size: 2.4rem;
            }
            .message::after {
                width: 70px;
                height: 3px;
                margin-top: 1rem;
            }
        }

        /* 超小设备 */
        @media (max-width: 360px) {
            .message {
                font-size: 2rem;
            }
        }

        /* 避免横屏时过度拉伸 */
        @media (orientation: landscape) and (max-height: 500px) {
            .glass-card {
                padding: 1.8rem 1.5rem;
            }
            .icon-wrapper {
                width: 90px;
                height: 90px;
                margin-bottom: 0.5rem;
            }
            .mobile-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <!-- 纯装饰角落，无文字内容 -->
    <div class="line-ornament"></div>
    <div class="corner-dots">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- 核心卡片：只有一句“请您移动到手机端打开” + 视觉图标（装饰） -->
    <div class="glass-card">
        <div class="icon-wrapper">
            <i class="fas fa-mobile-alt mobile-icon"></i>   <!-- 手机图标，仅装饰 -->
            <!-- 三个波纹装饰span，无文字 -->
            <span class="ripple"></span>
            <span class="ripple"></span>
            <span class="ripple"></span>
        </div>
        <!-- 唯一内容：请您移动到手机端打开（分行自然，仍为一句） -->
        <h1 class="message">请您移动到<br>手机端打开</h1>
        <!-- 注意：此处没有任何额外文字，只有h1包含核心提示。下划线纯装饰 -->
    </div>

    <!-- 附加微光点缀 (不影响内容) -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; background: radial-gradient(circle at 80% 20%, rgba(255, 240, 255, 0.15) 0%, transparent 50%);"></div>
</body>
</html>
